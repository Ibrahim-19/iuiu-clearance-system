{% extends "base.html" %}
{% block title %}{{ site_name }}{% endblock %}
{% block content %}
<div style="max-width:560px;margin:60px auto;text-align:center;">
  <h1 style="font-size:26px;margin-bottom:6px;">{{ site_name }}</h1>
  <p style="color:#5b6473;margin-bottom:28px;">Graduation clearance for IUIU Arua Campus finalists.</p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
    <a class="btn btn-primary" href="{{ url_for('auth.login') }}">Log In</a>
    <a class="btn btn-outline" href="{{ url_for('auth.register') }}">Sign Up</a>
  </div>
</div>
{% endblock %}
